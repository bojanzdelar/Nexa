server:
  port: ${PORT:8080}

spring:
  application:
    name: search-service
  jackson:
    default-property-inclusion: non_null
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}

aws:
  region: ${AWS_REGION:eu-central-1}
  dynamodb:
    catalog:
      table-name: ${DYNAMODB_CATALOG_TABLE:NexaCatalog}
      sk-index: ${DYNAMODB_CATALOG_SK_INDEX:sk-index}
  opensearch:
    endpoint: ${OPENSEARCH_ENDPOINT}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

origin:
  secret: ${ORIGIN_SECRET:}