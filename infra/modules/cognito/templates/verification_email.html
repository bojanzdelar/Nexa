<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Email</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        Segoe UI,
        Roboto,
        Helvetica,
        Arial,
        &quot;Apple Color Emoji&quot;,
        &quot;Segoe UI Emoji&quot;;
      color: #ffffff;
    "
  >
    <div style="max-width: 560px; margin: 0 auto; padding: 48px 16px">
      <!-- Outer container -->
      <div
        style="
          border-radius: 16px;
          background: rgba(0, 0, 0, 0.75);
          padding: 40px 28px;
          border: 1px solid rgba(255, 255, 255, 0.08);
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        "
      >
        <!-- Brand -->
        <div style="margin-bottom: 18px">
          <div
            style="
              display: inline-block;
              padding: 10px 14px;
              border-radius: 12px;
              background: rgba(23, 23, 23, 1);
              border: 1px solid rgba(255, 255, 255, 0.08);
              font-weight: 700;
              letter-spacing: 0.08em;
              font-size: 12px;
              color: #ffffff;
            "
          >
            NEXA
          </div>
        </div>
        <!-- Title -->
        <h1
          style="
            margin: 0 0 8px;
            font-size: 34px;
            font-weight: 600;
            line-height: 1.1;
          "
        >
          Confirm your email
        </h1>
        <!-- Subtitle -->
        <p
          style="
            margin: 0 0 26px;
            color: #a3a3a3;
            font-size: 14px;
            line-height: 1.7;
          "
        >
          Use the confirmation code below to finish creating your account.
        </p>
        <!-- Code -->
        <div
          style="
            border-radius: 12px;
            background: #262626;
            padding: 18px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            margin: 0 0 22px;
          "
        >
          <div
            style="
              color: #a3a3a3;
              font-size: 12px;
              letter-spacing: 0.14em;
              text-transform: uppercase;
              margin-bottom: 8px;
            "
          >
            Confirmation code
          </div>
          <div
            style="
              font-size: 34px;
              font-weight: 700;
              letter-spacing: 0.22em;
              color: #22c55e; /* malachite-like */
            "
          >
            {####}
          </div>
        </div>
        <!-- Hint -->
        <p
          style="
            margin: 0 0 18px;
            color: #a3a3a3;
            font-size: 13px;
            line-height: 1.7;
          "
        >
          If you didn’t request this, you can ignore this message.
        </p>
        <!-- Divider -->
        <div
          style="
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 22px 0;
          "
        ></div>
        <!-- Footer -->
        <p style="margin: 0; color: #737373; font-size: 12px; line-height: 1.6">
          © Nexa • Automated message — please do not reply.
        </p>
      </div>
      <!-- bottom note -->
      <div
        style="
          text-align: center;
          margin-top: 14px;
          color: #737373;
          font-size: 12px;
        "
      >
        Having trouble? Contact support.
      </div>
    </div>
  </body>
</html>
